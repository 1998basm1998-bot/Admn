<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رفع الفيديوهات الذكية</title>
    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #0072ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e1e38 0%, var(--bg-dark) 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .upload-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .drop-zone {
            border: 2px dashed rgba(0, 198, 255, 0.4);
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(0, 198, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.2);
        }

        .drop-zone span {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        .file-info {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            word-break: break-all;
        }

        .btn-upload {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 198, 255, 0.6);
        }

        .btn-upload:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 3D Progress Bar */
        .progress-wrapper {
            display: none;
            margin-top: 30px;
            perspective: 800px;
        }

        .progress-3d {
            width: 100%;
            height: 24px;
            background: #0f172a;
            border-radius: 6px;
            transform-style: preserve-3d;
            transform: rotateX(20deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), 
                        inset 0 2px 4px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0072ff, #00c6ff);
            position: relative;
            transform-style: preserve-3d;
            transition: width 0.3s ease;
            box-shadow: 0 0 12px rgba(0, 198, 255, 0.8);
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                45deg,
                rgba(255,255,255,0.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,0.15) 50%,
                rgba(255,255,255,0.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 30px 30px;
            animation: moveStripes 1s linear infinite;
        }

        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 30px 0; }
        }

        .progress-text {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            color: var(--primary);
        }

        .result-box {
            display: none;
            margin-top: 25px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>رفع فيديو إلى Top4Top</h2>
        
        <form id="uploadForm" action="https://top4top.io/index.php" method="POST" enctype="multipart/form-data" target="hiddenIframe">
            <input type="file" name="file[]" id="fileInput" accept="video/*" style="display: none;">
            <input type="hidden" name="app_key" value="Dt12cu666cyudm4dvo401v651f9yq7v4p1ngq4mj9aqcpc7t59h3f4z00yovuszz">
            <input type="hidden" name="token" value="Dt12cu666cyudm4dvo401v651f9yq7v4p1ngq4mj9aqcpc7t59h3f4z00yovuszz">
            <input type="hidden" name="submit" value="true">
        </form>

        <iframe name="hiddenIframe" id="hiddenIframe" style="display: none;"></iframe>
        
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <span>🎬</span>
            <p>اضغط هنا لاختيار ملف الفيديو</p>
        </div>

        <div class="file-info" id="fileInfo">لم يتم اختيار أي ملف بعد</div>

        <button class="btn-upload" id="uploadBtn" disabled>ابدأ الرفع الآن</button>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-3d">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="result-box" id="resultBox">
            <p style="color: #10b981; margin-top: 0;">تم إرسال الملف! 🎉</p>
            <div id="linkContainer"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadForm = document.getElementById('uploadForm');
        const hiddenIframe = document.getElementById('hiddenIframe');
        
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const resultBox = document.getElementById('resultBox');
        const linkContainer = document.getElementById('linkContainer');

        let simulationInterval;
        let isUploading = false;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
                fileInfo.innerHTML = `<strong>الملف المحدد:</strong> ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
                uploadBtn.disabled = false;
                resultBox.style.display = 'none';
            } else {
                fileInfo.innerHTML = `<span style="color: #ef4444;">عذراً، يرجى اختيار ملف فيديو صالح!</span>`;
                uploadBtn.disabled = true;
            }
        });

        uploadBtn.addEventListener('click', () => {
            if (fileInput.files.length === 0) return;

            isUploading = true;
            
            // إظهار الواجهات وتعطيل الزر
            progressWrapper.style.display = 'block';
            uploadBtn.disabled = true;
            progressBar.style.width = '0%';
            progressText.innerText = 'جاري التحضير...';

            // إرسال الفورم برمجياً
            uploadForm.submit();

            // أنميشن وهمي يحاكي الرفع (لأن الـ CORS يمنعنا من قراءة البايتات الحقيقية)
            let simulatedProgress = 0;
            simulationInterval = setInterval(() => {
                // يزيد ببطء حتى يصل إلى 90% وينتظر استجابة الـ iframe
                if (simulatedProgress < 90) {
                    simulatedProgress += Math.random() * 5;
                    if (simulatedProgress > 90) simulatedProgress = 90;
                    progressBar.style.width = simulatedProgress + '%';
                    progressText.innerText = `جاري الرفع: ${Math.round(simulatedProgress)}%`;
                }
            }, 800);
        });

        // التقاط حدث انتهاء تحميل الـ iframe (أي انتهاء رفع الملف ومعالجته من سيرفر Top4Top)
        hiddenIframe.addEventListener('load', () => {
            if (isUploading) {
                clearInterval(simulationInterval);
                isUploading = false;
                
                progressBar.style.width = '100%';
                progressText.innerText = 'اكتمل الرفع!';
                
                resultBox.style.display = 'block';
                linkContainer.innerHTML = `
                    <p>تم إرسال الملف بنجاح نحو المنصة عبر الـ Iframe.</p>
                    <p>لا يمكن عرض الرابط هنا بسبب سياسات الحماية، يرجى مراجعة <strong>حسابك في الموقع</strong> لتأكيد وصول الفيديو.</p>
                `;
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
